services:
  postgres:
    image: postgres:17

    container_name: eduadmit-postgres

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - eduadmit-network

  pgadmin:

    image: dpage/pgadmin4

    container_name: eduadmit-pgadmin

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "5050:80"

    depends_on:
      - postgres

    networks:
      - eduadmit-network

volumes:
  postgres_data:

networks:
  eduadmit-network:
